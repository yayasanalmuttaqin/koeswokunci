<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin - Data Guru Madin</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: #ffffff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eef2f5; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 24px; color: #2c3e50; }
        .user-info { font-size: 14px; color: #555; text-align: right; }
        .btn-logout { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 5px; }
        .badge-secure { background-color: #2ecc71; color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
        .search-box { margin-bottom: 20px; width: 100%; padding: 10px 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background-color: #34495e; color: #ffffff; text-align: left; padding: 12px; font-weight: 600; }
        td { padding: 12px; border-bottom: 1px solid #eef2f5; }
        tr:hover { background-color: #f8f9fa; }
        .blur-data { filter: blur(4px); cursor: pointer; transition: filter 0.2s ease; }
        .blur-data:hover { filter: blur(0); }
        .loading { text-align: center; padding: 20px; font-size: 16px; color: #7f8c8d; }
        .footer { margin-top: 20px; text-align: center; font-size: 12px; color: #7f8c8d; }
    </style>
</head>
<body>

<script>
    // PROTEKSI HALAMAN: Jika belum login, langsung tendang balik ke login.html
    if (sessionStorage.getItem("isLoggedIn") !== "true") {
        window.location.href = "login.html";
    }
</script>

<div class="container">
    <div class="header">
        <div>
            <h1>Data Guru Madin</h1>
            <small>Sumber data: Database Live</small>
        </div>
        <div class="user-info">
            <span class="badge-secure">🔒 Login: <span id="adminRole">Role</span></span><br>
            Halo, <strong id="adminNama">Nama</strong>! 
            <button class="btn-logout" onclick="logout()">Keluar</button>
        </div>
    </div>

    <input type="text" id="searchInput" class="search-box" onkeyup="filterTable()" placeholder="Cari nama, NIK, atau nama Madin...">

    <div class="table-responsive">
        <table id="guruTable">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>NIK</th>
                    <th>Alamat</th>
                    <th>No. HP</th>
                    <th>No. Rekening</th>
                    <th>Nama Madin</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="6" class="loading">Memuat data guru dari Database Pusat...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="footer">
        <p>&copy; Portal Admin Madin. Semua data disensor secara visual demi keamanan tambahan.</p>
    </div>
</div>

<script>
    // MASUKKAN URL WEB APP SCRIPT ANDA DI SINI
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyx2gaaB4EoiFRsdm-l7ImuZ__U0D8LxjE0f9R4yvxNN3mEaC_770Ib_-qPiiyC8EbJ/exec";

    // Tampilkan informasi admin yang sedang login
    document.getElementById("adminNama").innerText = sessionStorage.getItem("adminNama");
    document.getElementById("adminRole").innerText = sessionStorage.getItem("adminRole");

    // Ambil data dari Google Sheets saat halaman dimuat
    function loadData() {
        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ action: "get_guru" })
        })
        .then(res => res.json())
        .then(response => {
            if (response.status === "success") {
                const data = response.data;
                const tbody = document.getElementById("tableBody");
                tbody.innerHTML = ""; // Bersihkan loading text

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="loading">Tidak ada data guru.</td></tr>`;
                    return;
                }

                data.forEach(guru => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>${guru.Nama || '-'}</td>
                        <td><span class="blur-data" title="Arahkan kursor untuk melihat">${guru.NIK || '-'}</span></td>
                        <td>${guru.Alamat || '-'}</td>
                        <td>${guru.No_HP || '-'}</td>
                        <td><span class="blur-data" title="Arahkan kursor untuk melihat">${guru.No_Rekening || '-'}</span></td>
                        <td>${guru.Nama_Madin || guru['Nama Madin'] || '-'}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                alert("Gagal memuat data: " + response.message);
            }
        })
        .catch(err => {
            document.getElementById("tableBody").innerHTML = `<tr><td colspan="6" class="loading" style="color:red">Gagal terhubung mengambil data dari Spreadsheet.</td></tr>`;
        });
    }

    function filterTable() {
        var input, filter, table, tr, td, i, j, txtValue;
        input = document.getElementById("searchInput");
        filter = input.value.toUpperCase();
        table = document.getElementById("guruTable");
        tr = table.getElementsByTagName("tr");

        for (i = 1; i < tr.length; i++) {
            tr[i].style.display = "none";
            td = tr[i].getElementsByTagName("td");
            for (j = 0; j < td.length; j++) {
                if (td[j]) {
                    txtValue = td[j].textContent || td[j].innerText;
                    if (txtValue.toUpperCase().indexOf(filter) > -1) {
                        tr[i].style.display = "";
                        break;
                    }
                }
            }
        }
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = "login.html";
    }

    // Jalankan penarikan data otomatis
    window.onload = loadData;
</script>
</body>
</html>
